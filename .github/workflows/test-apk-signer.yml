name: Test APK Signer Action
on:
  workflow_dispatch:

jobs:
  test-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Sign APK
        uses: ./  # Use local action in the same repo
        with:
          apk-path: app/app-release.apk
          keystore-base64: ${{ secrets.TEST_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.TEST_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.TEST_KEY_ALIAS }}
          key-password: ${{ secrets.TEST_KEY_PASSWORD }}
          sdk-version: "12.0"

      - name: Upload signed APK as artifact
        uses: actions/upload-artifact@v6
        with:
          name: signed-apk
          path: signed.apk